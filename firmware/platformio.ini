[platformio]
default_envs = esp32dev

[env]
framework = arduino
monitor_speed = 115200
monitor_rts = 0
monitor_dtr = 0
lib_deps =
  esphome/ESPAsyncWebServer-esphome@^3.3.0
  esphome/AsyncTCP-esphome@^2.1.4
  bblanchon/ArduinoJson@^7.4.2
  tzapu/WiFiManager@^2.0.17

[env:esp32dev]
platform = espressif32@6.10.0
board = esp32dev
board_build.filesystem = littlefs
board_build.partitions = partitions/ota_littlefs_4mb.csv
build_unflags =
  -std=gnu++11
build_flags =
  -std=gnu++17
  -D BP100G2_FIRMWARE
  -D CORE_DEBUG_LEVEL=3
upload_protocol = esptool
upload_speed = 921600


[env:esp32dev_bench]
extends = env:esp32dev
build_flags =
  ${env:esp32dev.build_flags}
  -D BP100G2_BENCH_MODE

[env:native]
platform = native
test_framework = unity
build_flags =
  -std=c++17
  -D UNIT_TEST
lib_deps =
  bblanchon/ArduinoJson@^7.4.2
build_src_filter =
  +<balboa/protocol.cpp>
  +<storage/config_model.cpp>
